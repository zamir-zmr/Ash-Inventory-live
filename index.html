    <style>
        /* --- Themes --- */
        :root {
            --bg: #e4fbff;
            --panel: #ffffff;
            --card: #a5f0ff;
            --accent: #0ea5e9;
            --teal: #0d9488;
            --danger: #e11d48;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass: rgba(0, 0, 0, 0.05);
            --input-bg: #f1f5f9;
            --border: #0ea5e9;

/*             --border: #e2e8f0;
 */        }

        [data-theme="dark"] {
            --bg: #0b0f1a;
            --panel: #161d2f;
            --card: #1e293b;
            --accent: #38bdf8;
            --teal: #2dd4bf;
            --danger: #e11d48;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --glass: rgba(255, 255, 255, 0.03);
            --input-bg: #0f172a;
            --border: #0ea5e9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container { width: 100%; max-width: 500px; margin: auto; }

        /* --- Header --- */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px 20px 5px; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--teal)); 
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }
        .header-text span { font-size: 10px; color: var(--text-dim); font-weight: 800; display: block; }
        .header-text strong { font-size: 15px; color: var(--text-main); }

        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border);
            color: var(--accent); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .icon-btn.active { background: var(--accent); color: #fff; }

        /* --- Forms --- */
        .glass-panel { background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; display: none; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .file-label { display: block; background: var(--panel); border: 1px dashed var(--accent); color: var(--accent); padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; margin-bottom: 12px; cursor: pointer; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }

/* Category List Styling */



.cat-btns {
    display: flex;
    gap: 15px;
}
/* Purana wala delete karke ye naya paste karein */
#catListArea span {
    color: var(--text-main) !important; /* Ye automatically Theme ke hisaab se color badlega */
    font-weight: 600;
    font-size: 15px;
}

/* Full Page Category Modal Style */
#categoryModal .modal {
    width: 100%;
    height: 100%;
    max-width: none; /* Desktop limit hatane ke liye */
    border-radius: 0; /* Full screen mein corners round nahi chahiye */
    margin: 0;
    display: flex;
    flex-direction: column;
    padding: 0; /* Padding control niche header mein karenge */
}

/* Modal ke andar ka content full scrollable banane ke liye */
#categoryModal .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Header ko fix karne ke liye (Optionally) */
.cat-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
}


.cat-item-container {
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px; 
    background: var(--glass); 
    border-radius: 12px; 
    margin-bottom: 8px; 
    border: 1px solid var(--border);
}


        /* --- Grid & Cards --- */
        .category-header { font-size: 11px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; margin: 25px 0 12px 5px; display: flex; align-items: center; gap: 10px; }
        .category-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }

/* LIST MODE FIX */
.stock-card.list-mode {
    display: flex !important;
    flex-direction: row !important;
    align-items: center !important;
    justify-content: flex-start !important;
    gap: 12px !important;
    height: auto !important;
}

/* IMAGE LEFT FIX */
.stock-card.list-mode img {
    width: 65px !important;
    height: 65px !important;
    object-fit: cover !important;
    border-radius: 10px !important;
}

/* PREVENT IMAGE CENTER ISSUE */
.stock-card.list-mode > div:first-child {
    flex-shrink: 0 !important;
}

/* RIGHT SIDE CONTENT */
.stock-card.list-mode > div:nth-child(2) {
    flex: 1 !important;
    display: flex !important;
    flex-direction: column !important;
    justify-content: center !important;
}





/* Cards ke beech professional gap dene ke liye */
.stock-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 16px; /* Dono cards ke beech 16px ka gap */
    padding: 10px 5px; /* Side se thoda space */
}



        .stock-card {

/* --- Manage Overlay Updated --- */

.action-bar {

/* Icons ko thoda bada aur saaf dikhane ke liye */

}


        




        /* --- Modals --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }

        /* Professional Toast Styling */
#toast {
    visibility: hidden;
    min-width: 280px;
    background: #0d9488; /* Professional Teal */
    color: white;
    text-align: center;
    border-radius: 50px; /* Capsule shape */
    padding: 14px 24px;
    position: fixed;
    z-index: 9999;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

#toast.show {
    visibility: visible;
    animation: slideUpFade 0.5s forwards, slideDownFade 0.5s 2.5s forwards;
}

/* Modal and Preview Animations */
.fade-in { animation: fadeIn 0.4s ease-in-out; }

@keyframes slideUpFade {
    from { bottom: 0; opacity: 0; }
    to { bottom: 40px; opacity: 1; }
}

@keyframes slideDownFade {
    from { bottom: 40px; opacity: 1; }
    to { bottom: 0; opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Edit Preview Image Enhancement */
#editImgPreview {
    transition: transform 0.3s ease;

#editImgPreview:hover {

<script>
    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyA3bsKfP7CxS0Sb0CY6xu_vFogVcxbJCII",
        authDomain: "ashcostingapp.firebaseapp.com",
        databaseURL: "https://ashcostingapp-default-rtdb.firebaseio.com",
        projectId: "ashcostingapp",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false, isManageMode = false, currentUser = "Guest";
    let cropperInstance = null, currentFileMode = "new", finalImageData = "";

    // 2. Theme Logic
    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('#themeBtn i');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');

let cropper; // Cropper instance control karne ke liye

function handleFileSelect(input, mode) {
    if (input.files && input.files[0]) {
        currentFileMode = mode;
        const reader = new FileReader();
        reader.onload = function (e) {
            const modal = document.getElementById('cropModal');
            const target = document.getElementById('cropTarget');
            
            target.src = e.target.result;
            modal.style.display = 'flex';

            if (cropper) cropper.destroy();

            target.onload = function() {
                cropper = new Cropper(target, {
                    aspectRatio: 1, 
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 1
                });
            };
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function applyCrop() {
    if (!cropper) return; 

    // Resize to 400x400 for perfect compression
    const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
    
    // Quality 0.5 ensures file is around 30-50KB
    const base64 = canvas.toDataURL('image/jpeg', 0.5);
    finalImageData = base64; 

    if (currentFileMode === 'edit') {
        document.getElementById('editImgPreview').src = base64;
        document.getElementById('editPreviewContainer').style.display = 'block';
        document.getElementById('editFileName').innerText = "✅ Photo Compressed";
    } else {
        document.getElementById('addImgPreview').src = base64;
        document.getElementById('addPreviewBox').style.display = 'block';
        document.getElementById('fileName').innerText = "✅ Photo Ready (Small Size)";
    }
    
    closeCrop();
    showToast("Photo Compressed & Ready! 📸");
}

function closeCrop() {
    document.getElementById('cropModal').style.display = 'none';
    if (cropper) {
        cropper.destroy();
        cropper = null;
    }
}


function saveCroppedImage() {
    // Quality ko 0.3 kiya hai taaki 11MB ki photo 15-20KB ban jaye
    cropperInstance.result({ 
        type: 'base64', 
        size: { width: 300, height: 300 }, // Size chhota karne se KB kam ho jata hai
        format: 'jpeg',
        quality: 0.3 // Compression level (0.1 low to 1.0 high)
    }).then(function (base64) {
        finalImageData = base64;
        
        if (currentFileMode === 'edit') {
            // Edit Modal ke liye preview
            const editPreview = document.getElementById('editImgPreview');
            const editContainer = document.getElementById('editPreviewContainer');
            editPreview.src = base64;
            editContainer.style.display = 'block';
            document.getElementById('editFileName').innerText = "✅ Photo Changed";
        } else {
            // Add Panel ke liye preview
            const previewBox = document.getElementById('addPreviewBox');
            const previewImg = document.getElementById('addImgPreview');
            previewImg.src = base64;
            previewBox.style.display = 'block'; 
            document.getElementById('fileName').innerText = "Selected Photo";
        }

}

// --- 1. ADMIN DATA & LOGIN LOGIC (PASSWORD MATCHING SYSTEM) ---
function handleLogin(inputUser, inputPass) {
    const u = (inputUser || (document.getElementById('loginUser') ? document.getElementById('loginUser').value : "")).toLowerCase().trim();
    const p = inputPass || (document.getElementById('loginPass') ? document.getElementById('loginPass').value : "");

    // --- JAB AAP GITHUB PAR YAHAN PASSWORD BADLENGE, SAB LOGOUT HO JAYENGE ---
    const users = { 
        "zamir": "admin", 
        "ashfaque": "admin",
        "nazir": "admin"
    };

    if (users[u] && users[u] === p) {
        isAdmin = true; 
        currentUser = u.charAt(0).toUpperCase() + u.slice(1);
        
        // --- IMPORTANT: User aur Password dono save karne honge ---
        localStorage.setItem("user", currentUser);
        localStorage.setItem("userKey", p); 
        
        updateAdminUI(currentUser);
        if(typeof closeModals === 'function') closeModals(); 
        render();
        return { success: true, username: currentUser };
    } else { 
        return { success: false };
    }
}

        padding: '15px', // Vertical compress

        customClass: {
            popup: 'cyan-border-popup' // Thick cyan border aur curves jo login/logout mein hain
        }
    }).then((result) => {
        if (result.isConfirmed) {
            // Step 1: Pehle items ko "undefined" par shift karein
            db.ref("stocks").once("value", snapshot => {
                const stocks = snapshot.val();
                for (let sId in stocks) {
                    if (stocks[sId].catId === id) {
                        db.ref("stocks/" + sId).update({ catId: "undefined" });

                // Step 2: Category ko delete karein
                db.ref("categories/" + id).remove().then(() => {

function render() {

        // --- Get History first, then render everything ---
        db.ref("transfers").limitToLast(10).once("value", transferSnap => {
            const transfers = transferSnap.val();
            
            db.ref("categories").once("value", catSnap => {
                const cats = catSnap.val() || {};

                // 2. History Section (FIXED TIME LOGIC)
                let historyHtml = "";
                if(transfers) {
                    let rows = Object.keys(transfers).reverse().map(tId => {
                        const t = transfers[tId]; 
                        
                        // FIX: Agar database mein time hai toh wahi dikhao, varna blank rakho

function filter() {
    const q = document.getElementById('search').value.toLowerCase();
    const cards = document.querySelectorAll('.stock-card');
    const dashboard = document.getElementById('lowStockDashboard');
    
    // Search ke waqt dashboard hide karo
    if(dashboard) {
        dashboard.style.display = (q === "") ? "block" : "none";
    }

    cards.forEach(card => {
        const itemName = card.getAttribute('data-name') || "";
        if (itemName.includes(q)) {
            card.style.setProperty('display', isListView ? 'flex' : 'flex', 'important');
        } else {
            card.style.setProperty('display', 'none', 'important');
        }
    });

    document.querySelectorAll('.cat-block').forEach(block => {
        const hasVisibleCards = Array.from(block.querySelectorAll('.stock-card')).some(c => 
            c.style.display !== "none"
        );
        
        if (hasVisibleCards || q === "") {
            block.style.display = "block";
        } else {
            block.style.display = "none";
        }
    });
}

 function processStockShare() {
    const panelTarget = document.getElementById('sharePanel');
    const sId = document.getElementById('shareItemSelect').value; 
    const branch = document.getElementById('shareBranch').value;
    const qtyInput = document.getElementById('shareQty');
    const sendQty = parseFloat(qtyInput.value);
    const sel = document.getElementById('shareItemSelect');
    const opt = sel.options[sel.selectedIndex];

    if(!sId || !branch || isNaN(sendQty) || sendQty <= 0) {
        Swal.fire({ title: "Error", text: "Details sahi bharein!", icon: "error", target: panelTarget });
        return;
    }

    const currentQty = parseFloat(opt.getAttribute('data-qty'));
    const itemName = opt.text;
    const unit = opt.getAttribute('data-unit');

    if(sendQty > currentQty) {
        Swal.fire({ title: "Low Stock", icon: "error", target: panelTarget });
        return;
    }

    const newQty = (currentQty - sendQty).toFixed(2);

    db.ref(`stocks/${sId}`).update({ qty: newQty }).then(() => {
        const now = new Date();
        // Time display ke liye: 30/03/2026 12:44 AM
        const finalDateTime = now.toLocaleDateString('en-GB') + " " + now.toLocaleTimeString('en-US', { hour12: true });
        // Date filter ke liye: 30/03/2026
        const simpleDate = now.toLocaleDateString('en-GB'); 

        const transferData = {
            itemId: sId,
            itemName: itemName,
            branch: branch, // Filter 'branch' dhoondega
            qty: sendQty,
            unit: unit,
            by: (typeof currentUser !== 'undefined' && currentUser !== "") ? currentUser : "Admin",
            time: finalDateTime,
            date: simpleDate // YE SABSE ZAROORI HAI
        };

        return db.ref("transfers").push(transferData);
    }).then(() => {
        Swal.fire({ title: "Sent!", icon: "success", timer: 1000, showConfirmButton: false, target: panelTarget });
        qtyInput.value = "";
        populateShareDropdown();
    });
}

// FIX: Edit function jo stock ko sahi se adjust karta hai
function editTransfer(tId) {
    const panelTarget = document.getElementById('sharePanel');

    db.ref(`transfers/${tId}`).once("value", snap => {
        const oldData = snap.val();
        if(!oldData) return;

        Swal.fire({
            title: 'Update Quantity',
            input: 'number',
            inputValue: oldData.qty,
            showCancelButton: true,
            confirmButtonText: 'Update Stock',
            confirmButtonColor: 'var(--teal)',
            target: panelTarget,
            inputValidator: (value) => {
                if (!value || value <= 0) return 'Enter the correct quantity!'
            }
        }).then((res) => {
            if(res.isConfirmed) {
                const newQty = parseFloat(res.value);
                const oldQty = parseFloat(oldData.qty);
                const diff = newQty - oldQty; 

                const stockId = oldData.itemId; 
                
                if(!stockId) {
                    // Agar itemId nahi hai, toh name se search karo (for old data)
                    db.ref("stocks").orderByChild("name").equalTo(oldData.itemName).once("value", sSnap => {
                        const stocks = sSnap.val();
                        if(!stocks) {
                            Swal.fire({ title: "Error", text: "Item nahi mila!", icon: "error", target: panelTarget });
                            return;
                        }
                        const sKey = Object.keys(stocks)[0];
                        finalizeUpdate(sKey, stocks[sKey].qty, diff, newQty, tId);
                    });
                } else {
                    db.ref(`stocks/${stockId}`).once("value", sSnap => {
                        const sData = sSnap.val();
                        if(!sData) {
                            Swal.fire({ title: "Error", text: "Stock item missing!", icon: "error", target: panelTarget });
                            return;
                        }
                        finalizeUpdate(stockId, sData.qty, diff, newQty, tId);
                    });
                }
            }
        });
    });
}

function finalizeUpdate(sKey, currentStockQty, diff, newQty, tId) {
    const currentStock = parseFloat(currentStockQty);
    
    // Check if we have enough stock if quantity is increased
    if(diff > currentStock) {
        Swal.fire({ title: "Low Stock!", text: `In stock ${currentStock} left only`, icon: "error", target: document.getElementById('sharePanel') });
        return;
    }

    const finalStock = (currentStock - diff).toFixed(2);
    const updates = {};
    updates[`/stocks/${sKey}/qty`] = finalStock;
    updates[`/transfers/${tId}/qty`] = newQty;

    db.ref().update(updates).then(() => {
        Swal.fire({ title: "Updated!", icon: "success", timer: 1000, showConfirmButton: false, target: document.getElementById('sharePanel') });
        populateShareDropdown(); // Dropdown refresh karein
    });
}


function deleteTransfer(tId) {
    const panelTarget = document.getElementById('sharePanel');
    
    Swal.fire({
        title: 'Delete History?',
        text: "This will bring the stock back!",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Yes, delete!',
        confirmButtonColor: 'var(--danger)',
        target: panelTarget
    }).then((result) => {
        if (result.isConfirmed) {
            // 1. Pehle transfer data uthao
            db.ref(`transfers/${tId}`).once("value", snap => {
                const tData = snap.val();
                if(!tData) return;

                const returnQty = parseFloat(tData.qty);
                const itemName = tData.itemName;
                const itemId = tData.itemId;

                // 2. Stock dhoondne ka logic
                let stockRef;
                if(itemId) {
                    // Agar itemId hai (Nayi entries)
                    stockRef = db.ref(`stocks/${itemId}`);
                } else {
                    // Agar itemId nahi hai (Purani entries), toh Name se dhoondo
                    stockRef = db.ref("stocks").orderByChild("name").equalTo(itemName);
                }

                stockRef.once("value", sSnap => {
                    let sKey, sData;
                    
                    if(itemId) {
                        sKey = itemId;
                        sData = sSnap.val();
                    } else {
                        // Name search se pehla item pakdo
                        const stocks = sSnap.val();
                        if(stocks) {
                            sKey = Object.keys(stocks)[0];
                            sData = stocks[sKey];
                        }
                    }

                    if(sData && sKey) {
                        // 3. Stock update karo (2 + 2 = 4 logic)
                        const currentStock = parseFloat(sData.qty) || 0;
                        const finalStock = (currentStock + returnQty).toFixed(2);

                        db.ref(`stocks/${sKey}`).update({ qty: finalStock }).then(() => {
                            // 4. History se delete karo
                            return db.ref(`transfers/${tId}`).remove();
                        }).then(() => {
                            Swal.fire({ 
                                title: "Deleted!", 
                                text: `${returnQty} is bake in stock.`, 
                                icon: "success", 
                                target: panelTarget 
                            });
                            if(typeof populateShareDropdown === 'function') populateShareDropdown();
                        });
                    } else {
                        // Agar stock item hi delete ho gaya ho tab ye aayega
                        db.ref(`transfers/${tId}`).remove();
                        Swal.fire({ title: "Deleted", text: "History deleted, but stock item not found.", icon: "info", target: panelTarget });
                    }
                });
            });
        }
    });
}

// Global variable to keep track of active date filter



let currentActiveDateFilter = 'all';

function filterData(type) {
    // 1. Current filter state update
    if (type !== 'branch') {
        currentActiveDateFilter = type;
    }

    // 2. "All" click karne par sab reset
    if (type === 'all') {
        document.getElementById('monthFilter').value = "";
        document.getElementById('yearFilter').value = "";
        document.getElementById('branchFilter').value = "";
        document.getElementById('datePicker').value = "";
        currentActiveDateFilter = 'all';
    }

    // 3. Filter ki values uthao
    const todayDate = new Date().toLocaleDateString('en-GB'); 
    const selMonth = document.getElementById('monthFilter').value;
    const selYear = document.getElementById('yearFilter').value;
    const selBranch = document.getElementById('branchFilter').value;
    
    let customDate = "";
    const dateInputVal = document.getElementById('datePicker').value;
    if(dateInputVal) {
        const d = dateInputVal.split('-'); 
        customDate = `${d[2]}/${d[1]}/${d[0]}`; 
    }

    // Database se data lena (Hamesha poora data filter hoga)
    db.ref("transfers").once("value", snap => {
        const data = snap.val();
        
        // Dono containers (Admin aur Guest)
        const adminContainer = document.getElementById('transferHistory');
        const guestContainer = document.getElementById('recentTransfersList');

        if (!data) {
            const emptyMsg = "<p style='text-align:center; padding:20px; color:gray;'>No data found.</p>";
            if(adminContainer) adminContainer.innerHTML = emptyMsg;
            if(guestContainer) guestContainer.innerHTML = emptyMsg;
            return;
        }

        let html = "";
        const keys = Object.keys(data).reverse();

        keys.forEach(id => {
            const t = data[id];
            if (!t.date) return;

            let dateMatch = false;
            let branchMatch = false;

            // --- DATE FILTER LOGIC ---
            if (currentActiveDateFilter === 'all') {
                dateMatch = true;
            } else if (currentActiveDateFilter === 'today') {
                if (t.date === todayDate) dateMatch = true;
            } else if (currentActiveDateFilter === 'customDate') {
                if (t.date === customDate) dateMatch = true;
            } else if (currentActiveDateFilter === 'month') {
                const dbParts = t.date.split('/'); 
                if (dbParts[1] === selMonth) {
                    if (selYear === "" || dbParts[2] === selYear) dateMatch = true;
                }
            } else if (currentActiveDateFilter === 'year') {
                const dbParts = t.date.split('/');
                if (dbParts[2] === selYear) dateMatch = true;
            }

            // --- BRANCH FILTER LOGIC ---
            if (selBranch === "" || (t.branch && t.branch.toLowerCase().trim() === selBranch.toLowerCase().trim())) {
                branchMatch = true;
            }

            // --- FINAL HTML GENERATION ---
            if (dateMatch && branchMatch) {
                html += `
                <div id="card-${id}" oncontextmenu="showTransferOptions('${id}'); return false;" style="background:var(--panel); padding:12px; border-radius:18px; border:1px solid var(--border); margin-bottom:10px; cursor:pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.03);">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                        <div style="flex:1;">
                            <b style="color:var(--text-main); font-size:14px;">${t.itemName}</b>
                            <div style="color:var(--teal); font-size:10px; font-weight:700; margin-top:3px;">
                                <i class="fas fa-location-dot"></i> To: ${t.branch}
                            </div>
                        </div>
                        <div style="text-align:right;">
                            <div style="background:rgba(225, 29, 72, 0.1); color:var(--danger); padding:4px 10px; border-radius:12px; font-weight:900; font-size:13px;">
                                -${t.qty} <small style="font-size:9px;">${t.unit}</small>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:10px; padding-top:8px; border-top:1px dashed var(--border); display:flex; justify-content:space-between; align-items:center;">
                        <div style="font-size:10px; color:var(--text-main);">
                            <i class="fas fa-user-circle" style="color:var(--teal);"></i> By: <b>${t.by || 'Admin'}</b>
                        </div>
                        <div style="font-size:9px; color:var(--text-dim);">${t.time}</div>
                    </div>
                </div>`;
            }
        });

        const finalHtml = html || "<p style='text-align:center; padding:20px; color:gray;'>No matching records.</p>";
        
        if(adminContainer) adminContainer.innerHTML = finalHtml;
        if(guestContainer) guestContainer.innerHTML = finalHtml;
    });
}

// Jab app load ho, toh default 'all' data dikhane ke liye
window.onload = function() {
    filterData('all'); 
};
