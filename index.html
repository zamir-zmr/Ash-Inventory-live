<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ash inventory Live</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>

    <style>
        /* --- Themes --- */
        :root {
            --bg: #e4fbff;
            --panel: #ffffff;
            --card: #a5f0ff;
            --accent: #0ea5e9;
            --teal: #0d9488;
            --danger: #e11d48;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --glass: rgba(0, 0, 0, 0.05);
            --input-bg: #f1f5f9;
            --border: #0ea5e9;

/*             --border: #e2e8f0;
 */        }

        [data-theme="dark"] {
            --bg: #0b0f1a;
            --panel: #161d2f;
            --card: #1e293b;
            --accent: #38bdf8;
            --teal: #2dd4bf;
            --danger: #e11d48;
            --text-main: #f1f5f9;
            --text-dim: #64748b;
            --glass: rgba(255, 255, 255, 0.03);
            --input-bg: #0f172a;
            --border: #0ea5e9;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text-main);
            margin: 0; padding: 15px; min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        .container { width: 100%; max-width: 500px; margin: auto; }

        /* --- Header --- */
        .app-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 5px 20px 5px; }
        .user-profile { display: flex; align-items: center; gap: 12px; }
        .avatar { 
            width: 42px; height: 42px; background: linear-gradient(135deg, var(--accent), var(--teal)); 
            border-radius: 14px; display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: #fff; box-shadow: 0 4px 15px rgba(56, 189, 248, 0.2);
        }
        .header-text span { font-size: 10px; color: var(--text-dim); font-weight: 800; display: block; }
        .header-text strong { font-size: 15px; color: var(--text-main); }

        .header-actions { display: flex; gap: 8px; }
        .icon-btn {
            background: var(--panel); border: 1px solid var(--border);
            color: var(--accent); width: 40px; height: 40px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .icon-btn.active { background: var(--accent); color: #fff; }

        /* --- Forms --- */
        .glass-panel { background: var(--panel); border-radius: 20px; padding: 20px; border: 1px solid var(--border); margin-bottom: 20px; display: none; }
        input, select { background: var(--input-bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 12px; width: 100%; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .file-label { display: block; background: var(--panel); border: 1px dashed var(--accent); color: var(--accent); padding: 10px; border-radius: 10px; text-align: center; font-size: 12px; margin-bottom: 12px; cursor: pointer; }
        .btn-main { background: var(--accent); color: #fff; border: none; padding: 14px; border-radius: 12px; font-weight: 800; width: 100%; cursor: pointer; }

/* Category List Styling */



.cat-btns {
    display: flex;
    gap: 15px;
}
/* Purana wala delete karke ye naya paste karein */
#catListArea span {
    color: var(--text-main) !important; /* Ye automatically Theme ke hisaab se color badlega */
    font-weight: 600;
    font-size: 15px;
}

/* Full Page Category Modal Style */
#categoryModal .modal {
    width: 100%;
    height: 100%;
    max-width: none; /* Desktop limit hatane ke liye */
    border-radius: 0; /* Full screen mein corners round nahi chahiye */
    margin: 0;
    display: flex;
    flex-direction: column;
    padding: 0; /* Padding control niche header mein karenge */
}

/* Modal ke andar ka content full scrollable banane ke liye */
#categoryModal .modal-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
}

/* Header ko fix karne ke liye (Optionally) */
.cat-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    border-bottom: 1px solid var(--border);
}


.cat-item-container {
    display: flex; 
    justify-content: space-between; 
    align-items: center; 
    padding: 12px; 
    background: var(--glass); 
    border-radius: 12px; 
    margin-bottom: 8px; 
    border: 1px solid var(--border);
}


        /* --- Grid & Cards --- */
        .category-header { font-size: 11px; font-weight: 900; color: var(--text-dim); text-transform: uppercase; margin: 25px 0 12px 5px; display: flex; align-items: center; gap: 10px; }
        .category-header::after { content: ""; flex: 1; height: 1px; background: var(--border); }


/* Cards ke beech professional gap dene ke liye */
.stock-grid { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 16px; /* Dono cards ke beech 16px ka gap */
    padding: 10px 5px; /* Side se thoda space */
}



        .stock-card {
            background: var(--card); border-radius: 20px; overflow: hidden;
            position: relative; border: 1px solid var(--border);
            aspect-ratio: 1 / 1.15; display: flex; flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }


/* SweetAlert Popup: Thick Cyan Border & Extra Curves */
.cyan-border-popup {
    border: 5px solid #00cbcd69 !important; /* Thick Border */
    border-radius: 30px !important; /* More Curves */
    box-shadow: 0 0 20px rgba(0, 186, 195, 0.3) !important;
    overflow: hidden; /* Taaki corners perfect dikhen */
}



        .card-img { width: 100%; height: 70%; object-fit: cover; background: var(--input-bg); }
        .card-body { padding: 10px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; position: relative; }
        .card-body h4 { margin: 0; font-size: 12px; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .qty-tag { color: var(--teal); font-size: 14px; font-weight: 800; display: inline-block; margin-top: 2px; }
        .meta-text { font-size: 1px; color: var(--text-dim); text-transform: uppercase; display: block; margin-top: 1px; }
/* --- Manage Overlay Updated --- */
.manage-overlay {
    position: absolute; 
    inset: 0;
    background: rgba(0, 0, 0, 0.2); /* Light dim effect taaki card focus mein rahe */
    display: none; 
    align-items: flex-end; /* Buttons ko niche shift karne ke liye */
    justify-content: center;
    z-index: 5;
    transition: all 0.3s ease;
}

.action-bar {
    background: var(--panel); 
    width: 100%; 
    padding: 10px 0;
    display: flex; 
    justify-content: space-evenly; 
    align-items: center;
    border-top: 1px solid var(--border);
    box-shadow: 0 -4px 10px rgba(0,0,0,0.1);
    border-radius: 0 0 20px 20px; /* Card ke bottom corners ke saath match karega */
}

/* Icons ko thoda bada aur saaf dikhane ke liye */
.action-circle { 
    width: 40px; 
    height: 40px; 
    border-radius: 12px; 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    cursor: pointer; 
    font-size: 16px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}


        




        /* --- Modals --- */
        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(4px); }
        .modal { background: var(--panel); padding: 25px; border-radius: 24px; width: 90%; max-width: 360px; border: 1px solid var(--border); color: var(--text-main); }
        
        /* Cropping Modal UI */
        #cropArea { width: 100%; height: 280px; margin-bottom: 20px; }
        
        /* Professional Toast Styling */
#toast {
    visibility: hidden;
    min-width: 280px;
    background: #0d9488; /* Professional Teal */
    color: white;
    text-align: center;
    border-radius: 50px; /* Capsule shape */
    padding: 14px 24px;
    position: fixed;
    z-index: 9999;
    left: 50%;
    bottom: 40px;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 600;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

#toast.show {
    visibility: visible;
    animation: slideUpFade 0.5s forwards, slideDownFade 0.5s 2.5s forwards;
}

/* Modal and Preview Animations */
.fade-in { animation: fadeIn 0.4s ease-in-out; }

@keyframes slideUpFade {
    from { bottom: 0; opacity: 0; }
    to { bottom: 40px; opacity: 1; }
}

@keyframes slideDownFade {
    from { bottom: 40px; opacity: 1; }
    to { bottom: 0; opacity: 0; }
}

@keyframes fadeIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
}

/* Edit Preview Image Enhancement */
#editImgPreview {
    transition: transform 0.3s ease;
    cursor: zoom-in;
}
#editImgPreview:hover {
    transform: scale(1.05);
}

   #catListArea span {
    color: #00bac3 !important; /* Force names to be white */
}
     
    </style>
</head>

<script>
    // 1. Firebase Setup
    const firebaseConfig = {
        apiKey: "AIzaSyA3bsKfP7CxS0Sb0CY6xu_vFogVcxbJCII",
        authDomain: "ashcostingapp.firebaseapp.com",
        databaseURL: "https://ashcostingapp-default-rtdb.firebaseio.com",
        projectId: "ashcostingapp",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let isAdmin = false, isManageMode = false, currentUser = "Guest";
    let cropperInstance = null, currentFileMode = "new", finalImageData = "";

    // 2. Theme Logic
    function toggleTheme() {
        const body = document.body;
        const icon = document.querySelector('#themeBtn i');
        if (body.getAttribute('data-theme') === 'dark') {
            body.removeAttribute('data-theme');
            icon.className = 'fas fa-moon';
            localStorage.setItem('theme', 'light');
        } else {
            body.setAttribute('data-theme', 'dark');
            icon.className = 'fas fa-sun';
            localStorage.setItem('theme', 'dark');
        }
    }

    // 3. Cropping Functions
 
 function handleFileSelect(input, mode) {
    if (input.files && input.files[0]) {
        currentFileMode = mode;
        const reader = new FileReader();
        reader.onload = function (e) {
            const modal = document.getElementById('cropModal');
            modal.style.display = 'flex';
            modal.style.zIndex = '2000';
            
            if (cropperInstance) cropperInstance.destroy();
            
            cropperInstance = new Croppie(document.getElementById('cropArea'), {
                viewport: { width: 250, height: 250, type: 'square' },
                boundary: { width: 320, height: 320 },
                showZoomer: true,
                enableOrientation: true,
                mouseWheelZoom: 'on'
            });
            cropperInstance.bind({ url: e.target.result });
        }
        reader.readAsDataURL(input.files[0]);
    }
}

function saveCroppedImage() {
    // Quality ko 0.3 kiya hai taaki 11MB ki photo 15-20KB ban jaye
    cropperInstance.result({ 
        type: 'base64', 
        size: { width: 300, height: 300 }, // Size chhota karne se KB kam ho jata hai
        format: 'jpeg',
        quality: 0.3 // Compression level (0.1 low to 1.0 high)
    }).then(function (base64) {
        finalImageData = base64;
        
        if (currentFileMode === 'edit') {
            // Edit Modal ke liye preview
            const editPreview = document.getElementById('editImgPreview');
            const editContainer = document.getElementById('editPreviewContainer');
            editPreview.src = base64;
            editContainer.style.display = 'block';
            document.getElementById('editFileName').innerText = "✅ Photo Changed";
        } else {
            // Add Panel ke liye preview
            const previewBox = document.getElementById('addPreviewBox');
            const previewImg = document.getElementById('addImgPreview');
            previewImg.src = base64;
            previewBox.style.display = 'block'; 
            document.getElementById('fileName').innerText = "Selected Photo";
        }
        
        document.getElementById('cropModal').style.display = 'none';
        showToast("Photo Compressed & Ready! 📸");
    });
}
function openDetails(name, qty, unit, img, by, time) {
    document.getElementById('detName').innerText = name;
    document.getElementById('detTitle').innerText = name; // Top bar mein bhi naam
    document.getElementById('detQty').innerText = qty;
    document.getElementById('detUnit').innerText = unit || 'Pcs';
    document.getElementById('detBy').innerText = by;
    document.getElementById('detTime').innerText = time;

    const imgEl = document.getElementById('detImg');
    if(img) {
        imgEl.src = img;
        imgEl.style.display = 'block';
    } else {
        imgEl.style.display = 'none';
    }

    document.getElementById('detailsModal').style.display = 'flex';
}

function closeDetails() {
    document.getElementById('detailsModal').style.display = 'none';
}


function openLogin() {
    if(isAdmin) {

async function addStock() {
    const c = document.getElementById('catDropdown').value;
    const n = document.getElementById('stockName').value.trim();
    const q = document.getElementById('stockQty').value;
    
    // YAHAN DHAYAN DEIN: Dropdown ki ID 'itemUnit' honi chahiye
    const unitDropdown = document.getElementById('itemUnit');
    const u = unitDropdown ? unitDropdown.value : "Pcs"; 
    
    if(c && n && finalImageData) {
        db.ref("stocks").push({ 
            catId: c, 
            name: n, 
            qty: q, 
            unit: u, // Ab yahan dropdown wali value hi jayegi
            img: finalImageData, 
            by: currentUser, 
            time: new Date().toLocaleString() 
        }).then(() => {
            document.getElementById('stockName').value = ""; 
            document.getElementById('stockQty').value = "";
            document.getElementById('fileName').innerText = "Add Photo";
            document.getElementById('addPreviewBox').style.display = 'none';
            document.getElementById('addImgPreview').src = "";
            finalImageData = "";
            showToast("Inventory Saved! ✅");
        }).catch(err => {
            showToast("Error saving data! ❌");
        });
    } else {
        alert("Please fill Name, Category and Crop a Photo!");
    }
}

function openEdit(id, cId, name, qty, currentImg, currentUnit) {
    document.getElementById('editName').value = name;
    document.getElementById('editQty').value = qty;
    document.getElementById('editCatDropdown').value = cId;
    
    // Edit Modal mein dropdown ki ID 'editItemUnit' honi chahiye
    const editUnitDropdown = document.getElementById('editItemUnit');
    if(editUnitDropdown) {
        editUnitDropdown.value = currentUnit || "Pcs";
    }
    
    const previewImg = document.getElementById('editImgPreview');
    const previewCont = document.getElementById('editPreviewContainer');
    if (currentImg && previewImg) {
        previewImg.src = currentImg;
        previewCont.style.display = 'block';
    }
    
    document.getElementById('editModal').style.display = 'flex';
    
    document.getElementById('saveEditBtn').onclick = function() {
        const updatedUnit = document.getElementById('editItemUnit') ? document.getElementById('editItemUnit').value : "Pcs";
        
        let updateData = {
            catId: document.getElementById('editCatDropdown').value,
            name: document.getElementById('editName').value,
            qty: document.getElementById('editQty').value,
            unit: updatedUnit, // Nayi unit save karega
            by: currentUser,
            time: new Date().toLocaleString()
        };
        
        if (finalImageData !== "") updateData.img = finalImageData;
        
        db.ref("stocks/" + id).update(updateData).then(() => {
            finalImageData = ""; 
            closeModals();
            isManageMode = false; 
            render(); 
            showToast("Item Updated! ✅");
        });
    };
}

function deleteCat(id, name) {
    Swal.fire({
        title: '<span style="font-size: 18px;">Delete Category?</span>',
        html: `
            <div style="margin-top: -10px;">
                <i class="fas fa-folder-minus" style="font-size: 2.5rem; color: var(--danger); margin-bottom: 10px; display: block;"></i>
                <p style="font-size: 13px; color: var(--text-main); font-weight: 500; margin-bottom: 5px;">Delete "${name}"?</p>
                <p style="font-size: 10px; color: var(--text-dim); font-style: italic;">All its items will be moved to the "Undefined" category..</p>
            </div>
        `,
        showCancelButton: true,
        confirmButtonColor: 'var(--danger)',
        cancelButtonColor: 'var(--text-dim)',
        confirmButtonText: 'Yes, Delete',
        cancelButtonText: 'Cancel',
        background: 'var(--panel)',
        color: 'var(--text-main)',
        width: '290px', // Horizontal compress
        padding: '15px', // Vertical compress
        backdrop: `rgba(0,0,0,0.5)`,
        customClass: {
            popup: 'cyan-border-popup' // Thick cyan border aur curves jo login/logout mein hain
        }
    }).then((result) => {
        if (result.isConfirmed) {
            // Step 1: Pehle items ko "undefined" par shift karein
            db.ref("stocks").once("value", snapshot => {
                const stocks = snapshot.val();
                for (let sId in stocks) {
                    if (stocks[sId].catId === id) {
                        db.ref("stocks/" + sId).update({ catId: "undefined" });
                    }
                }
                
                // Step 2: Category ko delete karein
                db.ref("categories/" + id).remove().then(() => {
                    showToast("Category Deleted! 🗑️");
                    render(); // UI refresh karne ke liye
                });
            });
        }
    });
}

        ${s.img ? 
            `<img src="${s.img}" class="card-img" style="width:100%; height:70%; object-fit:cover; display:block;">` : 
            `<div class="no-img" style="width:100%; height:70%; display:flex; align-items:center; justify-content:center; background:var(--input-bg);">
                <i class="fas fa-image" style="font-size:24px; color:var(--text-dim);"></i>

                <div class="qty-tag" style="color:var(--teal); font-size:17px; font-weight:800; line-height:1;">${s.qty} ${displayUnit}</div>
            </div>

            </span>

            </div>
        </div>
    </div>`;
}

function render() {
    // 1. Categories Dropdown logic
    db.ref("categories").on("value", snap => {
        let opts = '<option value="">Category</option>';
        const cats = snap.val();
        for(let k in cats) opts += `<option value="${k}">${cats[k].name}</option>`;
        if(isAdmin) opts += `<option value="undefined" style="color:var(--danger)">⚠️ Undefined</option>`;
        
        document.getElementById('catDropdown').innerHTML = opts;
        document.getElementById('editCatDropdown').innerHTML = opts;
    });

    // 2. Stocks Display logic
    db.ref("stocks").on("value", stockSnap => {
        const stocks = stockSnap.val();
        db.ref("categories").once("value", catSnap => {
            const cats = catSnap.val() || {};
            let html = "";
            let processedStockIds = new Set();

            // STEP 1: Normal Categories render karein
            for(let cId in cats) {
                let itemsHtml = "";
                for(let sId in stocks) {
                    if(stocks[sId].catId === cId) {
                        itemsHtml += generateStockCardHtml(sId, stocks[sId], cId);
                        processedStockIds.add(sId);
                    }
                }
                if(itemsHtml !== "") {
                    html += `<div class="cat-block">
                                <div class="category-header">${cats[cId].name}</div>
                                <div class="stock-grid">${itemsHtml}</div>
                             </div>`;
                }
            }

            // STEP 2: Undefined items (Sirf Admin ke liye)
            if(isAdmin) { 
                let undefinedHtml = "";
                for(let sId in stocks) {
                    if(!processedStockIds.has(sId)) {
                        undefinedHtml += generateStockCardHtml(sId, stocks[sId], "undefined");
                    }
                }
                if(undefinedHtml !== "") {
                    html = `<div class="cat-block" style="border: 2px dashed var(--danger); border-radius: 15px; padding: 10px; margin-bottom: 20px; background: rgba(225, 29, 72, 0.05);">
                                <div class="category-header" style="color:var(--danger)">⚠️ Admin Action: Undefined Items</div>
                                <div class="stock-grid">${undefinedHtml}</div>
                            </div>` + html;
                }
            }

            document.getElementById('contentArea').innerHTML = html || '<p style="text-align:center; padding:50px; color:var(--text-dim);">No items found.</p>';
        });
    });
}

// Page load hote hi units fetch karna shuru kar dein

// --- UNITS LISTENER (Line-by-Line Optimized) ---
db.ref("units").on("value", snapshot => {
    const data = snapshot.val();
    
    // 1. Data ko array mein convert karein
    units = data ? Object.entries(data).map(([id, val]) => ({ id, ...val })) : [];
    
    // 2. Dropdown ke liye Options taiyar karein (Kg, Pcs, etc.)
    // Humne 'u.name' ko value aur text dono mein rakha hai
    const unitOptions = units.map(u => `<option value="${u.name}">${u.name}</option>`).join('');
    
    // 3. ADD MODAL ka dropdown update karein
    const addSel = document.getElementById('itemUnit');
    if (addSel) {
        addSel.innerHTML = unitOptions || '<option value="">No Units</option>';
    }
    
    // 4. EDIT MODAL ka dropdown update karein (Ye zaroori tha)
    const editSel = document.getElementById('editItemUnit');
    if (editSel) {
        editSel.innerHTML = unitOptions || '<option value="">No Units</option>';
    }
    
    // 5. Agar Unit Management ka Full Page Modal khula hai, toh list refresh karein
    const unitModal = document.getElementById('unitModal');
    if (unitModal && unitModal.style.display === 'flex') {
        renderUnitsList();
    }
});

    `).join('');
}

// Unit add karne ka function
function addUnit() {
    const name = document.getElementById('unitInput').value.trim();
    if (name) {
        db.ref("units").push({ name: name }).then(() => {
            document.getElementById('unitInput').value = '';
            showToast("Unit Added! ✅");
            // renderUnitsList automatic ho jayega 'on value' listener se
        });
    } else {
        showToast("Please enter a name! ❌");
    }
}

// Rename aur Delete functions (Wahi rahenge jo pehle the)
// Bas unke end mein renderUnitsList() call karna zaroori hai agar automatic nahi ho raha

function renameUnit(id, oldName) {
    Swal.fire({
        title: '<span style="font-size: 16px;">Rename Unit</span>',
        html: `
            <div style="margin-top: -5px;">
                <i class="fas fa-edit" style="font-size: 2rem; color: #00bac3; margin-bottom: 10px; display: block;"></i>
                <input type="text" id="swal-input-rename-unit" class="swal2-input" value="${oldName}"
                    style="width: 85%; height: 38px; margin: 5px auto; border-radius: 12px; border: 2px solid #00bac3; background: var(--input-bg); color: var(--text-main); font-size: 14px; text-align:center; outline:none;">
            </div>
        `,
        background: 'var(--panel)',
        color: 'var(--text-main)',
        confirmButtonText: 'UPDATE',
        confirmButtonColor: '#00bac3',
        showCancelButton: true,
        width: '290px',
        customClass: { popup: 'cyan-border-popup' },
        // --- Z-INDEX FIX START ---
        didOpen: () => {
            const container = document.querySelector('.swal2-container');
            if (container) container.style.zIndex = "3000";
        },
        // --- Z-INDEX FIX END ---
        preConfirm: () => {
            const newName = document.getElementById('swal-input-rename-unit').value.trim();
            if (!newName || newName === oldName) return false;
            return newName;
        }
    }).then(result => {
        if (result.isConfirmed) {
            db.ref("units/" + id).update({ name: result.value }).then(() => {
                showToast("Unit Updated! ✅");
                // Modal ki list refresh karne ke liye agar zaroorat ho
            });
        }
    });
}

function deleteUnit(id, name) {
    Swal.fire({
        title: '<span style="font-size: 18px;">Delete Unit?</span>',
        text: `Do you want to delete "${name}"?`,
        icon: 'error',
        iconColor: 'var(--danger)',
        showCancelButton: true,
        confirmButtonColor: 'var(--danger)',
        confirmButtonText: 'Yes, Delete',
        background: 'var(--panel)',
        color: 'var(--text-main)',
        width: '280px',
        customClass: { popup: 'cyan-border-popup' },
        // --- Z-INDEX FIX START ---
        didOpen: () => {
            const container = document.querySelector('.swal2-container');
            if (container) container.style.zIndex = "3000";
        }
        // --- Z-INDEX FIX END ---
    }).then(result => {
        if (result.isConfirmed) {
            db.ref("units/" + id).remove().then(() => {
                showToast("Unit Deleted! 🗑️");
            });
        }
    });
}



  
</script>
